name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish to (e.g. v2.7.5)'
        required: true
        default: 'v2.7.5'
      ref:
        description: 'Git ref to build from (branch/tag/commit)'
        required: true
        default: 'main'

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

jobs:
  tauri-release-macos:
    # Apple Silicon runner → aarch64-apple-darwin DMG.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Swift sidecar (macOS)
        # Real kivio-ocr-helper (Apple Vision OCR); satisfies externalBin validation.
        run: npm run build:swift

      - name: Build and publish macOS DMG
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Kivio ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated macOS (Apple Silicon) build for ${{ env.RELEASE_TAG }}.
            Built from: ${{ env.BUILD_REF }}
            - macOS: DMG (Apple Silicon / aarch64, unsigned — first launch: right-click → Open, or run `xattr -cr /Applications/Kivio.app`)

            Windows NSIS installer (.exe) is built locally and uploaded separately.
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'rc') }}
          includeUpdaterJson: false
          tauriScript: npx tauri
          args: --target aarch64-apple-darwin --bundles dmg
