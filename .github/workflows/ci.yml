name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Tauri 在 Linux 上编译需要 glib/gtk/webkit 等系统库（应用本身只发 macOS/Windows，
      # 但 CI 在 Linux 上跑平台无关的 Rust 测试，cargo test 仍需编过 Tauri 依赖）。
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev

      # tauri-build 会校验 externalBin（kivio-ocr-helper）对应当前 target triple 的二进制存在。
      # build:swift 在非 macOS 平台生成 stub 占位，满足校验（否则 cargo test 在 build-script 阶段失败）。
      - name: Build Swift sidecar stub
        run: npm run build:swift

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
